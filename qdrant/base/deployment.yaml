apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      serviceAccountName: qdrant
      containers:
        - name: qdrant
          image: QDRANT_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: /data/storage
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: /data/snapshots
          volumeMounts:
            - name: qdrant-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: oauth-proxy
          image: OAUTH_PROXY_IMAGE
          imagePullPolicy: Always
          args:
            - --provider=openshift
            - --upstream=http://localhost:6333
            - --https-address=:9443
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - '--openshift-delegate-urls={"/": {"namespace": "qdrant", "resource": "services", "name": "qdrant", "verb": "get"}}'
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --openshift-service-account=qdrant
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          ports:
            - containerPort: 9443
              name: proxy
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: tls-secret
              mountPath: /etc/tls/private
            - name: cookie-secret
              mountPath: /etc/proxy/secrets
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
        - name: tls-secret
          secret:
            secretName: qdrant-tls
        - name: cookie-secret
          secret:
            secretName: qdrant-proxy-cookie-secret
