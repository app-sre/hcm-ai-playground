name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .github/yamllint-config.yml .

  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Build agent-swarm overlay
        run: kustomize build agent-swarm/overlays/hcmaii

      - name: Build inference-service
        run: |
          if [ -f inference-service/kustomization.yaml ]; then
            kustomize build inference-service
          fi

      - name: Build operators
        run: |
          find operators -name kustomization.yaml -mindepth 2 -maxdepth 3 | while read -r f; do
            dir=$(dirname "$f")
            echo "::group::Building $dir"
            kustomize build "$dir" || exit 1
            echo "::endgroup::"
          done
