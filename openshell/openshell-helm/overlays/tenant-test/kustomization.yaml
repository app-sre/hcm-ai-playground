apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tenant-test

resources:
  - ../../base
  - policies
  - secrets
  - provider-init-job.yaml

patches:
  - target:
      kind: Namespace
      name: openshell
    patch: |-
      - op: replace
        path: /metadata/name
        value: tenant-test
      - op: replace
        path: /metadata/annotations/openshift.io~1display-name
        value: "OpenShell - Tenant Test"
  - target:
      kind: Route
      name: openshell
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: tenant-test
