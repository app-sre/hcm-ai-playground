apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-policy-tenant-test
  namespace: tenant-test
  labels:
    app: openshell
    team: tenant-test
data:
  policy.yaml: |
    version: 1

    # Filesystem access - STATIC (locked at creation)
    filesystem_policy:
      include_workdir: true
      read_only:
        - /usr
        - /lib
        - /lib64
        - /proc
        - /dev/urandom
        - /etc
        - /bin
        - /sbin
      read_write:
        - /sandbox
        - /tmp
        - /dev/null
        - /dev/pts

    # Landlock LSM enforcement
    landlock:
      compatibility: best_effort

    # Process identity - STATIC
    process:
      run_as_user: sandbox
      run_as_group: sandbox

    # Network policies - DYNAMIC (hot-reloadable)
    # TENANT-TEST: More restrictive, audit mode for testing
    network_policies:
      # GitHub API - audit only for testing
      github_api:
        name: "GitHub REST API (Audit)"
        endpoints:
          - host: "api.github.com"
            port: 443
            protocol: rest
            enforcement: audit  # Only logs, doesn't block
            access: read-only
            rules:
              - allow:
                  method: GET
                  path: "/repos/**"
        binaries:
          - path: /usr/bin/gh
          - path: /usr/local/bin/claude

      # Anthropic API
      anthropic_api:
        name: "Anthropic API"
        endpoints:
          - host: "api.anthropic.com"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - path: /usr/local/bin/claude

      # PyPI - read-only for testing
      pypi:
        name: "PyPI Registry"
        endpoints:
          - host: "pypi.org"
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: "files.pythonhosted.org"
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
        binaries:
          - path: /usr/bin/pip
          - path: /usr/bin/python
