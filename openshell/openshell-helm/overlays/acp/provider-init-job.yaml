apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-provider-init
  namespace: acp
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-provider-init
  namespace: acp
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  template:
    metadata:
      name: openshell-provider-init
    spec:
      serviceAccountName: openshell-provider-init
      restartPolicy: OnFailure
      containers:
        - name: provider-init
          image: alpine:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openshell-providers-acp
                  key: ANTHROPIC_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openshell-providers-acp
                  key: GITHUB_TOKEN
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Installing grpcurl..."
              apk add --no-cache curl
              curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin grpcurl
              chmod +x /usr/local/bin/grpcurl

              echo "Waiting for OpenShell gateway to be ready..."

              GATEWAY="openshell.${NAMESPACE}.svc.cluster.local:8080"

              # Wait for the gRPC service to be available
              until grpcurl -plaintext ${GATEWAY} list > /dev/null 2>&1; do
                echo "Gateway not ready yet, waiting..."
                sleep 5
              done

              echo "Gateway is ready!"

              # Create Claude provider if ANTHROPIC_API_KEY is set
              if [ -n "${ANTHROPIC_API_KEY}" ] && [ "${ANTHROPIC_API_KEY}" != "REPLACE_WITH_REAL_KEY" ]; then
                echo "Creating Claude provider..."
                grpcurl -plaintext -d '{
                  "provider": {
                    "metadata": {
                      "name": "'${NAMESPACE}'-claude"
                    },
                    "type": "claude",
                    "credentials": {
                      "ANTHROPIC_API_KEY": "'${ANTHROPIC_API_KEY}'"
                    }
                  }
                }' ${GATEWAY} openshell.v1.OpenShell/CreateProvider || \
                  echo "Provider ${NAMESPACE}-claude already exists or failed to create"
              else
                echo "Skipping Claude provider (no valid API key)"
              fi

              # Create GitHub provider if GITHUB_TOKEN is set
              if [ -n "${GITHUB_TOKEN}" ] && [ "${GITHUB_TOKEN}" != "REPLACE_WITH_REAL_TOKEN" ]; then
                echo "Creating GitHub provider..."
                grpcurl -plaintext -d '{
                  "provider": {
                    "metadata": {
                      "name": "'${NAMESPACE}'-github"
                    },
                    "type": "github",
                    "credentials": {
                      "GITHUB_TOKEN": "'${GITHUB_TOKEN}'"
                    }
                  }
                }' ${GATEWAY} openshell.v1.OpenShell/CreateProvider || \
                  echo "Provider ${NAMESPACE}-github already exists or failed to create"
              else
                echo "Skipping GitHub provider (no valid token)"
              fi

              echo "Provider initialization complete!"

              # List created providers
              grpcurl -plaintext ${GATEWAY} openshell.v1.OpenShell/ListProviders
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
