apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: acp

resources:
  - ../../base
  - policies
  - secrets
  - provider-init-job.yaml

patches:
  - target:
      kind: Namespace
      name: openshell
    patch: |-
      - op: replace
        path: /metadata/name
        value: acp
      - op: replace
        path: /metadata/annotations/openshift.io~1display-name
        value: "OpenShell - ACP"
  - target:
      kind: Route
      name: openshell
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: acp
