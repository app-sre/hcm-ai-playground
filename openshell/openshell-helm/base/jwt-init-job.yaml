---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-jwt-init
  namespace: openshell
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-jwt-init
  namespace: openshell
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-jwt-init
  namespace: openshell
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-jwt-init
subjects:
  - kind: ServiceAccount
    name: openshell-jwt-init
    namespace: openshell
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-jwt-init
  namespace: openshell
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    metadata:
      name: openshell-jwt-init
    spec:
      serviceAccountName: openshell-jwt-init
      restartPolicy: OnFailure
      containers:
        - name: jwt-keygen
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /bin/bash
            - -c
            - |
              set -e

              # Check if secret already exists
              if kubectl get secret openshell-jwt-keys -n ${NAMESPACE} &>/dev/null; then
                echo "Secret openshell-jwt-keys already exists, skipping creation"
                exit 0
              fi

              echo "Generating JWT signing keys..."

              # Create temp directory
              TMPDIR=$(mktemp -d)
              cd $TMPDIR

              # Generate Ed25519 key pair
              openssl genpkey -algorithm Ed25519 -out signing.pem
              openssl pkey -pubout -in signing.pem -out public.pem

              # Generate kid (key ID)
              echo "openshell-$(date +%s)" > kid

              echo "Creating Kubernetes secret..."

              # Create the secret
              kubectl create secret generic openshell-jwt-keys \
                --from-file=signing.pem=./signing.pem \
                --from-file=public.pem=./public.pem \
                --from-file=kid=./kid \
                -n ${NAMESPACE}

              echo "JWT secret created successfully"

              # Cleanup
              rm -rf $TMPDIR
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
