# OpenShift-specific overrides for OpenShell Helm chart
# This configuration is required due to Security Context Constraints (SCC) limitations

pkiInitJob:
  enabled: false

server:
  disableTls: true
  auth:
    # WARNING: No authentication - for development/testing only
    # TODO: Configure OIDC when Red Hat SSO client is available
    allowUnauthenticatedUsers: true

podSecurityContext:
  fsGroup: null

securityContext:
  runAsUser: null
