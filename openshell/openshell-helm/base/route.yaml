apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshell
  namespace: openshell
  annotations:
    haproxy.router.openshift.io/timeout: 5m
  labels:
    app: openshell
spec:
  to:
    kind: Service
    name: openshell
    weight: 100
  port:
    targetPort: 8080
  wildcardPolicy: None
