apiVersion: v1
kind: Service
metadata:
  name: openshell
  labels:
    helm.sh/chart: helm-chart-0.0.63
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell
    app.kubernetes.io/version: "0.0.63"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: grpc
      protocol: TCP
      name: grpc
      appProtocol: grpc
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
