# Source: helm-chart/templates/gateway-config.yaml
# SPDX-FileCopyrightText: Copyright (c) 2025-2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
# SPDX-License-Identifier: Apache-2.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-config
  labels:
    helm.sh/chart: helm-chart-0.0.63
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell
    app.kubernetes.io/version: "0.0.63"
    app.kubernetes.io/managed-by: Helm
data:
  gateway.toml: |
    [openshell]
    version = 1

    [openshell.gateway]
    bind_address          = "0.0.0.0:8080"
    health_bind_address   = "0.0.0.0:8081"
    metrics_bind_address  = "0.0.0.0:9090"
    log_level             = "info"
    sandbox_namespace     = "tiger-team"
    default_image         = "ghcr.io/nvidia/openshell-community/sandboxes/base:latest"
    supervisor_image      = "ghcr.io/nvidia/openshell/supervisor:0.0.63"
    disable_tls            = true
    enable_loopback_service_http = true

    [openshell.gateway.auth]
    allow_unauthenticated_users = true

    [openshell.gateway.gateway_jwt]
    signing_key_path = "/etc/openshell-jwt/signing.pem"
    public_key_path  = "/etc/openshell-jwt/public.pem"
    kid_path         = "/etc/openshell-jwt/kid"
    gateway_id       = "openshell"
    ttl_secs         = 3600

    [openshell.drivers.kubernetes]
    grpc_endpoint                = "http://openshell.tiger-team.svc.cluster.local:8080"
    service_account_name         = "openshell-sandbox"
    supervisor_sideload_method   = "init-container"
    sa_token_ttl_secs            = 3600
    app_armor_profile            = "Unconfined"
