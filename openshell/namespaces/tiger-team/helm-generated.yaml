# NetworkPolicy restricting SSH ingress on sandbox pods to the gateway pod.
# Sandbox pods are dynamically created by the server and labelled with
# openshell.ai/managed-by=openshell. This policy ensures only the gateway
# (openshell server) pod can reach the sandbox SSH port (2222), blocking
# lateral movement from other in-cluster workloads.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openshell-sandbox-ssh
  namespace: tiger-team
  labels:
    helm.sh/chart: helm-chart-0.0.63
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell
    app.kubernetes.io/version: "0.0.63"
    app.kubernetes.io/managed-by: Helm
spec:
  podSelector:
    matchLabels:
      openshell.ai/managed-by: openshell
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tiger-team
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openshell
              app.kubernetes.io/instance: openshell
      ports:
        - protocol: TCP
          port: 2222
---
