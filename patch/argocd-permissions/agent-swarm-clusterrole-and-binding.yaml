---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-swarm-argocd-cluster-resources-admin
rules:
  - apiGroups:
      - ""
    resources:
      - "namespaces"
    verbs:
      - "*"
  - apiGroups:
      - ""
    resources:
      - "serviceaccounts"
      - "secrets"
      - "persistentvolumeclaims"
      - "services"
    verbs:
      - "*"
  - apiGroups:
      - "apps"
    resources:
      - "deployments"
    verbs:
      - "*"
  - apiGroups:
      - "rbac.authorization.k8s.io"
    resources:
      - "clusterroles"
      - "clusterrolebindings"
    verbs:
      - "*"
  - apiGroups:
      - "route.openshift.io"
    resources:
      - "routes"
    verbs:
      - "*"
  - apiGroups:
      - "oauth.openshift.io"
    resources:
      - "oauthclients"
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-swarm-argocd-cluster-resources-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-swarm-argocd-cluster-resources-admin
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
